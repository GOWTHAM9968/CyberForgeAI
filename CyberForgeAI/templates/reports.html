<!DOCTYPE html>
<html>

<head>
<title>Security Reports</title>
</head>

<body>

<h1>Security Activity Logs</h1>

<table border="1">

<tr>
<th>User</th>
<th>Action</th>
</tr>

{% for log in logs %}

<tr>
<td>{{log.username}}</td>
<td>{{log.action}}</td>
</tr>

{% endfor %}

</table>

<a href="/dashboard">
Back Dashboard
</a>

</body>
</html>
